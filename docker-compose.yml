services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # 白名单持久化到挂载的 data 目录，容器重建不丢失
      - WHITELIST_FILE=/data/allowed_users.json
    extra_hosts:
      # 容器内访问宿主机服务时，用 http://host.docker.internal:端口
      # （.env 里 LLM_BASE_URL 写 localhost 在容器内是不通的）
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
